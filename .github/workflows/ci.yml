name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install package
        run: uv pip install --system -e .

      - name: Smoke test – regex parser
        run: |
          python -m pii_parser "Alice (alice@example.com) called +1-555-123-4567" --mode spans
          python -c "
          from pii_parser import parse
          r = parse('Bob bob@test.org 4111111111111111')
          assert len(r.detected_spans) >= 2, f'Expected >=2 spans, got {len(r.detected_spans)}'
          print('OK:', [s.label for s in r.detected_spans])
          "
